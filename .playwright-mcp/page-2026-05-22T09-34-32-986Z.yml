      - generic [ref=e93]:
        - generic [ref=e94]:
          - paragraph [ref=e95]: Hay Day国际服是一款卡通风格的模拟经营小游戏，玩家在游戏中需要经营你的农场，不仅包括养殖或者种植，还要完成食品和各种加工等一系列的产业链，完成自产自销。Hay Day国际服中通过售卖赚取的收益，升级农场的各种设施，让它变得更加智能化。开辟更多的领土，还可以设计你的小镇，开放码头吸引更多的顾客发展旅游业等等，更多玩法等待你的解锁。
          - heading "Hay Day国际服游戏介绍" [level=3] [ref=e96]
          - paragraph [ref=e97]: Hay Day国际服是一款休闲的经营类游戏，场景刻画精细，色彩鲜明，给玩家一种欢乐吵闹的氛围，设计你的农场布局，让各种智能化的设施相互连接成为一条产业链。
          - heading "Hay Day国际服游戏玩法" [level=3] [ref=e98]
          - paragraph [ref=e99]: 1、通过本站提供的卡通农场进入游戏，首先开始新手教程。
          - paragraph [ref=e100]: 2、首先学习如何收割成熟的小麦。
          - paragraph [ref=e101]: 3、教程详细的教了如何收割。
          - paragraph [ref=e102]: 4、按照教程提示，点击小麦，选择镰刀，然后拖动镰刀收割整片小麦。
          - paragraph [ref=e103]: 5、收割完成后播种新一轮小麦的种子。
          - paragraph [ref=e104]: 6、点击土地选择小麦种子，拖动小麦种子布满土地。
          - paragraph [ref=e105]: 7、跟着教程把仓库和房屋刷漆修缮一下。
          - paragraph [ref=e106]: 8、跟随教程使用市场，点击左下方市场选项。
          - paragraph [ref=e107]: 9、点开市场后根据任务购买三只母鸡。
          - paragraph [ref=e108]: 10、购买完成后为了使鸡更快下蛋可以使用道具加快这一速度。
          - heading "Hay Day国际服游戏优势" [level=3] [ref=e109]
          - paragraph [ref=e110]: 1、建造农场
          - paragraph [ref=e111]: "- 经营农场十分简单，获得耕地、种植作物、收获作物、循环往复。"
          - paragraph [ref=e112]: "- 为农场增添个性化元素，打造专属于您的独特乐园。"
          - paragraph [ref=e113]: "- 建造面包房、饲料厂、制糖厂等生产设施，让您的农场越来越繁荣。"
          - paragraph [ref=e114]: 2、种植作物
          - paragraph [ref=e115]: "- 小麦、玉米等作物永远不会枯萎。"
          - paragraph [ref=e116]: "- 收割后继续播种，收获更多作物，制作产品，比如用小麦制作面包。"
          - paragraph [ref=e117]: 3、饲养动物
          - paragraph [ref=e118]: "- 各种活泼可爱的动物等您解锁。"
          - paragraph [ref=e119]: "- 母鸡、马、奶牛等动物已经迫不及待要加入您的农场啦。"
          - paragraph [ref=e120]: "- 小狗、小猫、兔子等宠物也可以成为您农场大家庭的一员。"
          - paragraph [ref=e121]: 4、前往其他区域
          - paragraph [ref=e122]: "- 钓鱼区：修理好码头就可抛出鱼饵钓鱼。"
          - paragraph [ref=e123]: "- 小镇：修理好火车站，前往小镇完成小镇游客订单。"
          - paragraph [ref=e124]: "- 山谷：和好友畅玩不同主题的山谷开放季和活动。"
          - paragraph [ref=e125]: 5、与好友和社区成员互动畅玩
          - paragraph [ref=e126]: "- 创建您的社区，欢迎新成员。"
          - paragraph [ref=e127]: "- 与社区成员在游戏内交易作物和产品。"
          - paragraph [ref=e128]: "- 与好友分享游戏心得，帮助好友完成订单。"
          - paragraph [ref=e129]: "- 与社区成员一起参加每周的德比竞赛，赢取奖励。"
          - paragraph [ref=e130]: 6、交易物品
          - paragraph [ref=e131]: "- 通过卡车订单、航运订单等交易作物、商品和各种资源。"
          - paragraph [ref=e132]: "- 通过自己的路边小店出售物品。"
          - paragraph [ref=e133]: "- 农场经营也可体验交易元素。"
          - heading "Hay Day国际服游戏特色" [level=3] [ref=e134]
          - paragraph [ref=e135]: 1、拓展您的农场，个性化设计布局。
          - paragraph [ref=e136]: 2、在您自己的路边小店，与友邻交易作物和新鲜农产品。
          - paragraph [ref=e137]: 3、使用卡车或货船完成订单。
          - paragraph [ref=e138]: 4、修缮码头，利用鱼饵钓鱼。
          - paragraph [ref=e139]: 5、建立您自己的小镇，迎接游客。
          - heading "Hay Day国际服游戏亮点" [level=3] [ref=e140]
          - paragraph [ref=e141]: 1、免费游戏，无需充值即可畅玩。
          - paragraph [ref=e142]: 2、在您的农场用自己生产的天然原料制作美味食物。
          - paragraph [ref=e143]: 3、在路边小店购买和出售新鲜、健康的农场产品。
          - paragraph [ref=e144]: 4、与google+和脸书上的朋友一起玩，一起交易。
          - paragraph [ref=e145]: 5、简单，有趣的手势控制，模拟真实的农场体验。
          - paragraph [ref=e146]: 6、照顾可爱又有些调皮的、有个性的农场动物们。
          - paragraph [ref=e147]: 7、建造各种设施，例如咖啡亭和烧烤架。
          - paragraph [ref=e148]: 8、开垦土地，利用不同的工具扩建和装饰农场。
          - paragraph [ref=e149]: 9、漂亮精致的动画效果，轻松愉悦的配乐， 让您感觉到自己的农场充满勃勃生机。
          - heading "更新日志" [level=3] [ref=e150]
          - paragraph [ref=e151]:
            - strong [ref=e152]: v1.63.213版本
          - paragraph [ref=e153]: 《卡通农场》13岁啦，邀您一起来庆生!
          - paragraph [ref=e154]: 趣味新功能、生日惊喜等您来体验：
          - paragraph [ref=e155]: • 全新作物蓝莓上线，用它制作美味点心吧!
          - paragraph [ref=e156]: • 可爱新动物——水豚和小马来到农场!
          - paragraph [ref=e157]: • 《卡通农场》精彩回顾功能上线，查看您的个人数据与成就
          - paragraph [ref=e158]: • 设计节作品现可重新查看及提交
          - paragraph [ref=e159]: • 农场访客现在会提供经验值和建材奖励
          - paragraph [ref=e160]: 还有更多优化更新，让您在生日月可以尽情狂欢、畅玩一夏!
        - heading "小编点评：" [level=2] [ref=e161]

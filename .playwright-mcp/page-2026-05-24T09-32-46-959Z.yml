                  - text: ：该渠道 (channel) 包含最稳定的 Flutter 版本。大概每三个 beta 版本就会提升到稳定 (stable) 版本。稳定渠道 (stable channel) 是新开发者和生产应用发布最推荐的渠道 (channel)。
              - listitem [ref=e294]:
                - paragraph [ref=e295]:
                  - strong [ref=e296]: Beta channel
                  - text: ：该渠道 (channel) 是 Flutter 的最新版本，但尚未稳定。 beta 分支通常在每月的第一个星期三发布。一个修复通常会在 main channel 发布两周后进入 beta channel。 beta channel 会以

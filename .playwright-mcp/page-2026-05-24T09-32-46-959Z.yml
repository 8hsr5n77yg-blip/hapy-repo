                  - strong [ref=e300]: Main channel
                  - text: ：该渠道 (channel) 会有最新的特性，但尚未经过全面测试，可能会存在一些 Bug。我们不建议你使用它，除非你要为 Flutter 本身做出贡献。
            - paragraph [ref=e301]: SDK 归档列表中的每个 Flutter 版本都有以下信息：

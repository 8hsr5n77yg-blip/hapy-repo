      - generic [ref=e97]:
        - generic [ref=e98]:
          - paragraph [ref=e99]:
            - strong [ref=e100]: Hay Day卡通农场
            - text: 是一款农场模拟经营类手机游戏，玩家将从接手一处小小的农庄开始，一步步将其建成一座犹如梦幻庄园般的大庄园，成为农业生意上的大亨。Hay Day卡通农场支持玩家自由选择喜欢的作物进行种植，且游戏提供了丰富的交易售卖渠道，使游戏的自由度更上一层楼，更有好友联机功能让玩家之间能够通过经营来进行对决，收获更多的乐趣。喜欢的话就赶紧下载看看吧！
          - heading "Hay Day卡通农场游戏特色" [level=3] [ref=e101]
          - paragraph [ref=e102]:
            - strong [ref=e103]: 1、轻松经营农场,收获无限欢乐!
          - paragraph [ref=e104]: 您可以在农场里种植小麦和玉米等作物,即使从不下雨,它们也能茁壮成长。收割后继续播种,收获更多作物,再将作物加工成产品出售。随着农场的发展壮大,您还可以饲养母鸡、猪、奶牛等动物!给动物喂食,收集它们产出的鸡蛋、培根、牛奶等农产品,再利用这些产品来赚取金币,比如与其他农场主交易、完成卡车订单等。
          - paragraph [ref=e105]:
            - strong [ref=e106]: 2、全力发展农场,将普通的小农场打造成一应俱全的大庄园。
          - paragraph [ref=e107]: 建造面包房、烧烤架、制糖厂等生产设施,生产出售各种各样的产品,将农场生意越做越大!缝纫机和织布机可制作精美的服装,蛋糕烤炉则可以烘焙出美味的蛋糕。在这个梦幻乐园般的农场,一切皆有可能!
          - paragraph [ref=e108]:
            - strong [ref=e109]: 3、巧用各种装饰物打造您自己的专属独特农场。
          - paragraph [ref=e110]: 您可以将成就榜小屋、卡车和路边小店装修成与众不同的样式。熊猫雕像、生日蛋糕、竖琴、低音大号、大提琴等装饰物都是装饰农场的不错选择!特殊装饰物可以让您的农场变得更美,比如鲜花可以用来吸引蝴蝶。打造一个展现您个人特色的农场,说不定您的好友也能从中获得装饰农场的灵感哦!
          - paragraph [ref=e111]:
            - strong [ref=e112]: 4、完成卡车订单和航运订单,向游戏内角色出售农作物、商品和资源,获取经验值和金币。
          - paragraph [ref=e113]: 升级农场以解锁路边小店,出售更多商品和作物。
          - paragraph [ref=e114]:
            - strong [ref=e115]: 5、和好友一起畅玩山谷,丰富农场生活体验。
          - paragraph [ref=e116]: 加入或者创建一个社区,和社区成员交换游戏心得,互帮互助,共同打造美丽农场!每个社区最多可容纳30位农场主哦!快来创建您的专属农场吧!
          - heading "Hay Day卡通农场游戏玩法" [level=3] [ref=e117]
          - paragraph [ref=e118]: 1、首先打开Hay Day卡通农场，刚开始你需要熟悉下你的农场;
          - img "Hay Day卡通农场" [ref=e119]
          - paragraph [ref=e120]: 2、学习如何收割成熟的小麦;
          - img "Hay Day卡通农场" [ref=e121]
          - paragraph [ref=e122]: 3、教程详细的教了如何收割;
          - img "Hay Day卡通农场" [ref=e123]
          - paragraph [ref=e124]: 4、按照教程提示，点击小麦，选择镰刀，然后拖动镰刀收割整片小麦;
          - img "Hay Day卡通农场" [ref=e125]
          - paragraph [ref=e126]: 5、收割完成后播种新一轮小麦的种子;
          - img "Hay Day卡通农场" [ref=e127]
          - paragraph [ref=e128]: 6、点击土地选择小麦种子，拖动小麦种子布满土地;
          - img "Hay Day卡通农场" [ref=e129]
          - paragraph [ref=e130]: 7、跟着教程把仓库和房屋刷漆修缮一下;
          - img "Hay Day卡通农场" [ref=e131]
          - paragraph [ref=e132]: 8、跟随教程使用市场，点击左下方市场选项;
          - img "Hay Day卡通农场" [ref=e133]
          - paragraph [ref=e134]: 9、点开市场后根据任务购买三只母鸡;
          - img "Hay Day卡通农场" [ref=e135]
          - paragraph [ref=e136]: 10、购买完成后为了使鸡更快下蛋可以使用道具加快这一速度。
          - img "Hay Day卡通农场" [ref=e137]
          - heading "Hay Day卡通农场游戏攻略" [level=3] [ref=e138]
          - paragraph [ref=e139]:
            - strong [ref=e140]: 一、基础种植：农场的立身之本
          - paragraph [ref=e141]: 1、播种：点击小麦种子，在空田块上拖动，就能完成播种，种子会自动生长。
          - img "Hay Day卡通农场" [ref=e142]
          - paragraph [ref=e143]:
            - strong [ref=e144]: 2、收割：等作物成熟，拿起镰刀在成熟田块拖动，就能收割小麦，获得作物原料。
          - paragraph [ref=e145]: 核心技巧：
          - paragraph [ref=e146]: 前期优先种小麦、玉米这类生长快的作物，快速攒金币和经验;
          - paragraph [ref=e147]: 成熟作物不会枯萎，不用担心忘记收，但建议及时收割，避免占用田块;
          - paragraph [ref=e148]: 田块可以用金币解锁，等级越高，可解锁的田块越多，能种的作物种类也越丰富。
          - img "Hay Day卡通农场" [ref=e149]
          - paragraph [ref=e150]: 二、养殖系统：稳定的原料来源
          - paragraph [ref=e151]: 1、搭建住所：先在商店的「动物住所」分类，用金币购买鸡舍，放置在农场空地上。
          - img "Hay Day卡通农场" [ref=e152]
          - paragraph [ref=e153]: 2、购买动物：在「动物」分类，用金币购买母鸡，放入鸡舍中。
          - img "Hay Day卡通农场" [ref=e154]
          - paragraph [ref=e155]: 3、喂养与收获：动物会饿，需要用种植的作物(小麦)喂养，点击饲料篮投喂;
          - img "Hay Day卡通农场" [ref=e156]
          - paragraph [ref=e157]: 喂饱后动物会生产产品(母鸡产蛋)，用篮子点击就能收集鸡蛋;
          - paragraph [ref=e158]: 后续可解锁奶牛、绵羊、猪等动物，产出牛奶、羊毛、猪肉等高级原料。
          - img "Hay Day卡通农场" [ref=e159]
          - paragraph [ref=e160]:
            - strong [ref=e161]: 三、建造加工系统：把原料变高价商品
          - paragraph [ref=e162]: 1、解锁设施：等级提升后，在商店「生产设施」分类，用金币购买加工设备。
          - img "Hay Day卡通农场" [ref=e163]
          - paragraph [ref=e164]: 2、加工制作：把种植 / 养殖获得的原料放入设备，等待加工时间结束，就能获得成品(比如小麦→面粉→面包)。
          - img "Hay Day卡通农场" [ref=e165]
          - paragraph [ref=e166]:
            - strong [ref=e167]: 四、订单系统：快速赚金币
          - paragraph [ref=e168]: 1、接订单：农场的公告板会刷新订单，比如幼儿园订单需要鸡蛋，完成后可获得 16 金币 + 14 经验。
          - paragraph [ref=e169]: 完成订单：凑齐订单要求的物品，点击「发送」，卡车会来取货，直接到账金币和经验。
          - img "Hay Day卡通农场" [ref=e170]
          - paragraph [ref=e171]:
            - strong [ref=e172]: 五、等级提升：解锁更多玩法
          - paragraph [ref=e173]: 升级方式：通过种植、养殖、加工、完成订单获得经验，经验条满了就会升级。
          - paragraph [ref=e174]: 升级奖励：每次升级会解锁新作物、新动物、新设施、新地块，还会赠送金币、钻石等奖励(比如 4 级解锁面包炉、面包)。
          - paragraph [ref=e175]: 钻石用法：钻石是稀有货币，优先用来加速加工、扩建土地，不要乱花。
          - img "Hay Day卡通农场" [ref=e176]
          - heading "Hay Day卡通农场游戏亮点" [level=3] [ref=e177]
          - paragraph [ref=e178]:
            - strong [ref=e179]: 1、和平农场模拟器
          - paragraph [ref=e180]: "- 在这个牧场模拟器上耕作很容易 - 获取土地，种植农作物，收获，重复"
          - paragraph [ref=e181]: "- 定制您的家庭农场，打造属于您自己的一片天堂"
          - paragraph [ref=e182]: "- 贸易和销售——成为农场大亨"
          - paragraph [ref=e183]:
            - strong [ref=e184]: 2、种植和收获的农作物
          - paragraph [ref=e185]: "- 小麦和玉米等农作物在这个农场模拟器中永远不会死亡"
          - paragraph [ref=e186]: "- 收获并重新种植，或使用小麦等农作物来制作面包"
          - paragraph [ref=e187]: "- 交易并出售你的农作物，成为农业传奇"
          - paragraph [ref=e188]:
            - strong [ref=e189]: 3、在游戏中饲养动物
          - paragraph [ref=e190]: "- 认识古怪的动物"
          - paragraph [ref=e191]: "- 后养鸡、马、牛等"
          - paragraph [ref=e192]: "- 小狗、小猫和兔子等宠物可以添加到您的农场"
          - paragraph [ref=e193]: "- 饲养动物、农作物，并作为终极农场大亨打造你的农业冒险"
          - paragraph [ref=e194]:
            - strong [ref=e195]: 4、参观地点
          - paragraph [ref=e196]: "- 钓鱼湖：修复你的码头并投饵钓鱼"
          - paragraph [ref=e197]: "- 城镇：修复火车站并履行游客订单"
          - paragraph [ref=e198]: "- 山谷：在不同的季节和活动中与朋友一起玩"
          - paragraph [ref=e199]: "- 钓鱼是你农业冒险的关键——钓鱼、农业和贸易都在一款游戏中完成"
          - paragraph [ref=e200]:
            - strong [ref=e201]: 5、与朋友和邻居一起玩
          - paragraph [ref=e202]: "- 贸易农作物和新鲜商品"
          - paragraph [ref=e203]: "- 与朋友分享技巧并帮助他们完成交易"
          - paragraph [ref=e204]: "- 参加每周的邻里德比活动来赢得奖励"
          - paragraph [ref=e205]: "- 和朋友一起耕种更有趣"
          - paragraph [ref=e206]:
            - strong [ref=e207]: 6、农业模拟器
          - paragraph [ref=e208]: "- 让你的农场充满农作物、动物和乐趣"
          - paragraph [ref=e209]: "- 去钓鱼，抓鱼，并为你的农场添加新的奖励"
          - paragraph [ref=e210]: "- 装饰你的土地，打造终极农业模拟器体验"
